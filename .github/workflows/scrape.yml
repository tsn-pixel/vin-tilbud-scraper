name: Daglig vin-scraping

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Hent kode
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer afhaengigheder
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Koer scraper
        run: python wine_scraper.py

      - name: Gem wine_deals.json til repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wine_deals.json
          git diff --cached --quiet || git commit -m "Opdater vintilbud"
          git push
